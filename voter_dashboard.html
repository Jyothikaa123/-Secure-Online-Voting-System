<!DOCTYPE html>
<html>
<head>
<title>Candidate Login</title>

<style>
body{
background:linear-gradient(135deg,#8e2de2,#4a00e0);
font-family:Poppins;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:rgba(255,255,255,0.2);
backdrop-filter:blur(12px);
padding:40px;
border-radius:20px;
width:350px;
color:white;
text-align:center;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:white;
color:#4a00e0;
font-weight:bold;
}
</style>
</head>

<body>

<div class="card">
<h2>Candidate Login</h2>

<form method="POST">
<input name="phone" placeholder="Phone">
<input type="password" name="password" placeholder="Password">
<button>Login</button>
</form>
<p><a href="/user_register">Register Here</a></p>
</div>

</body>
</html>
