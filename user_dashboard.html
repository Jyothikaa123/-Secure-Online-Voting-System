<!DOCTYPE html>
<html>
<head>
<title>Enter Election</title>

<style>
body{
background:linear-gradient(135deg,#1e3c72,#2a5298);
font-family:Poppins;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.card{
background:rgba(255,255,255,0.2);
backdrop-filter:blur(12px);
padding:40px;
border-radius:20px;
width:350px;
text-align:center;
}

input{
width:100%;
padding:12px;
margin:12px 0;
border:none;
border-radius:8px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:white;
color:#2a5298;
font-weight:bold;
cursor:pointer;
}
</style>
</head>

<body>

<div class="card">

<h2>Enter Election</h2>

<form method="POST">

<input name="election_name" placeholder="Election Name" required>

<input name="election_id" placeholder="Election ID" required>

<button type="submit">Continue</button>

</form>

</div>

</body>
</html>
